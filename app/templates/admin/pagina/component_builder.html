  document.getElementById('cb-collapse-all-btn').addEventListener('click', () => {
    document.querySelectorAll('.cb-node-children').forEach(el => el.classList.add('collapsed'));
  });
  document.getElementById('cb-duplicate-btn').addEventListener('click', duplicateSelected);
  const jsonToggle = document.getElementById('cb-toggle-json-btn');
  if (jsonToggle) {
    jsonToggle.addEventListener('click', () => {
      const c = document.getElementById('collapsableJSON');
      if (c.style.display === 'none') {
        c.style.display = 'block';
        jsonToggle.textContent = 'Básico';
      } else {
        c.style.display = 'none';
        jsonToggle.textContent = 'Avançado';
      }
    });
  }
  const previewBtn = document.getElementById('cb-preview-btn');
  let previewRequiresReload = false;
  if (previewBtn) {
    previewBtn.addEventListener('click', () => {
      const w = document.getElementById('cb-preview-wrapper');
      if (previewRequiresReload) {
        updatePreview();
        previewRequiresReload = false;
        previewBtn.innerHTML = '<i class="fa fa-eye"></i>';
        previewBtn.title = 'Visualizar';
        return;
      }
      w.style.display = (w.style.display === 'none' ? 'block' : 'none');
    });
  }
  const previewClose = document.getElementById('cb-preview-close');
  if (previewClose) {
    previewClose.addEventListener('click', () => {
      document.getElementById('cb-preview-wrapper').style.display = 'none';
    });
  }

  renderTree();
  syncTextarea();
  // initial preview update
  updatePreview();
}

// ============================================================
// PATH HELPERS
// ============================================================
function getNode(path) {
  if (!path || path.length === 0) return null;
  let cur = state;
  for (let i = 0; i < path.length; i++) {
    if (Array.isArray(cur)) {
      cur = cur[path[i]];
    } else if (typeof cur === 'object') {
      cur = cur[path[i]];
    } else return null;
    if (cur === undefined || cur === null) return null;
  }
  return cur;
}

function setNode(path, val) {
  if (!path || path.length === 0) return;
  if (path.length === 1) { state[path[0]] = val; return; }
  let parent = getNode(path.slice(0, -1));
  if (parent !== null) parent[path[path.length-1]] = val;
}

function deleteNode(path) {
  if (!path || path.length === 0) return;
  const parent = path.length === 1 ? state : getNode(path.slice(0, -1));
  const key = path[path.length-1];
  if (Array.isArray(parent)) {
    parent.splice(key, 1);
  }
}

// Get components array for a node
function getComponentsArray(node) {
  if (!node) return null;
  const t = node.type || node.tipo;
  if (t === 'section') return node.components || null;
  if (['tabs','accordion','carousel'].includes(t)) return node.tabs || null;
  return null;
}

// ============================================================
// TREE RENDERING
// ============================================================
function renderTree() {
  const scroll = document.getElementById('cb-tree-scroll');
  scroll.innerHTML = '';
  state.forEach((node, i) => {
    scroll.appendChild(renderNode(node, [i], 0));
  });
}

function nodeLabel(node) {
  const t = node.type || node.tipo || '?';
  if (t === 'section') return `Seção${node.id ? ' #'+node.id : ''}${node.bg ? ' ('+node.bg+')' : ''}`;
  if (t === 'tabs') return `Abas`;
  if (t === 'accordion') return `Sanfona`;
  if (t === 'carousel') return `Carrossel`;
  if (t === 'header') return `Cabeçalho: ${node.titulo || ''}`;
  if (t === 'imagem') return `Imagem: ${node.titulo || ''}`;
  if (t === 'youtube') return `YouTube${node.video_id ? ' ('+node.video_id+')' : ''}`;
  if (t === 'mapa') return `Mapa`;
  if (t === 'button_rounded') return `Botão redondo: ${node.texto || ''}`;
  if (t === 'button_square') return `Botão quadrado: ${node.titulo || ''}`;
  if (t === 'button_inline') return `Botão inline: ${node.texto || ''}`;
  if (t === 'conteudo_square') return `Cartão: ${node.titulo || ''}`;
  if (t.startsWith('dynamic_')) {
    const comp = t.replace('dynamic_','');
    const labels = {slider:'Slider',arquivo:'Arquivo',noticias:'Notícias',arquivos:'Arquivos',calendar:'Calendário',texto:'Texto'};
    return '⚡ ' + (labels[comp] || comp);
  }
  if (node.label) return node.label;
  return t;
}

function nodeTypeClass(node) {
  const t = node.type || node.tipo || '';
  if (t === 'section') return 'section';
  if (DYNAMIC_TYPES.includes(t)) return 'dynamic';
  if (CONTAINER_TYPES.includes(t)) return 'section';
  return 'content';
}

function renderNode(node, path, depth) {
  const wrap = document.createElement('div');
  const t = node.type || node.tipo || '';
  const isSection = t === 'section';
  const isContainer = CONTAINER_TYPES.includes(t);
  const hasTabs = node.tabs && node.tabs.length > 0;
  const hasComponents = node.components && node.components.length > 0;
  const hasChildren = (isSection && (hasComponents || (node.main))) || (isContainer && hasTabs);

  const row = document.createElement('div');
  row.className = 'cb-node';
  row.style.paddingLeft = (8 + depth * 16) + 'px';
  row.dataset.path = JSON.stringify(path);

  const pathKey = JSON.stringify(path);
  if (JSON.stringify(selectedPath) === pathKey) row.classList.add('selected');

  // toggle
  const toggle = document.createElement('div');
  toggle.className = 'cb-node-toggle';
  if (hasChildren || (isSection && (node.components || isContainer))) {
    toggle.innerHTML = '<i class="fa fa-caret-down"></i>';
    toggle.addEventListener('click', (e) => { e.stopPropagation(); toggleChildren(wrap); });
  }
  row.appendChild(toggle);

  // drag handle
  const drag = document.createElement('div');
  drag.className = 'cb-drag-handle';
  drag.innerHTML = '⠿';
  drag.draggable = true;
  drag.addEventListener('dragstart', (e) => startDrag(e, path));
  row.appendChild(drag);

  // label
  const label = document.createElement('div');
  label.className = 'cb-node-label';
  label.textContent = nodeLabel(node);
  row.appendChild(label);

  // type badge
  const badge = document.createElement('div');
  badge.className = 'cb-node-type ' + nodeTypeClass(node);
  badge.textContent = (t||'?').replace('dynamic_','');
  row.appendChild(badge);

  // actions
  const actions = document.createElement('div');
  actions.className = 'cb-node-actions';

  if (isSection || isContainer) {
    const addBtn = document.createElement('button');
    addBtn.innerHTML = '+';
    addBtn.type = 'button';
    addBtn.title = 'Adicionar filho';
    addBtn.addEventListener('click', (e) => { e.stopPropagation(); showAddChildPicker(path, wrap); });
    actions.appendChild(addBtn);
  }

  // move up
  const upBtn = document.createElement('button');
  upBtn.type = 'button';
  upBtn.innerHTML = '↑';
  upBtn.addEventListener('click', (e) => { e.stopPropagation(); moveNode(path, -1); });
  actions.appendChild(upBtn);

  // move down
  const downBtn = document.createElement('button');
  downBtn.type = 'button';
  downBtn.innerHTML = '↓';
  downBtn.addEventListener('click', (e) => { e.stopPropagation(); moveNode(path, 1); });
  actions.appendChild(downBtn);

  const delBtn = document.createElement('button');
  delBtn.type = 'button';
  delBtn.innerHTML = '✕';
  delBtn.className = 'danger';
  delBtn.title = 'Deletar';
  delBtn.addEventListener('click', (e) => { e.stopPropagation(); confirmDelete(path); });
  actions.appendChild(delBtn);

  row.appendChild(actions);

  row.addEventListener('click', () => selectNode(path));
  row.addEventListener('dragover', (e) => { e.preventDefault(); row.style.background='#eff6ff'; });
  row.addEventListener('dragleave', () => { row.style.background=''; });
  row.addEventListener('drop', (e) => { e.preventDefault(); row.style.background=''; endDrag(path); });

  wrap.appendChild(row);

  // children container
  const childWrap = document.createElement('div');
  childWrap.className = 'cb-node-children';

  // section components
  if (isSection && node.components) {
    node.components.forEach((child, ci) => {
      childWrap.appendChild(renderNode(child, [...path, 'components', ci], depth+1));
    });
  }

  // dynamic container: tabs are shown but managed in props panel
  if (isContainer && node.tabs) {
    node.tabs.forEach((tab, ti) => {
      const tabWrap = document.createElement('div');
      const tabRow = document.createElement('div');
      tabRow.className = 'cb-node';
      tabRow.style.paddingLeft = (8 + (depth+1) * 16) + 'px';
      tabRow.dataset.path = JSON.stringify([...path, 'tabs', ti]);
      
      const tLabel = document.createElement('div');
      tLabel.className = 'cb-node-label';
      tLabel.textContent = '📄 ' + (tab.label || 'Tab '+ti);
      tabRow.appendChild(tLabel);
      tabRow.addEventListener('click', () => selectNode([...path, 'tabs', ti]));
      tabWrap.appendChild(tabRow);
      childWrap.appendChild(tabWrap);
    });
  }

  wrap.appendChild(childWrap);
  return wrap;
}

function toggleChildren(wrap) {
  const child = wrap.querySelector('.cb-node-children');
  if (child) child.classList.toggle('collapsed');
}

// ============================================================
// SELECTION
// ============================================================
function selectNode(path) {
  selectedPath = path;
  renderTree();
  renderProps();
  const dupBtn = document.getElementById('cb-duplicate-btn');
  dupBtn.style.display = path ? 'block' : 'none';
}

// ============================================================
// PROPS RENDERING
// ============================================================
function renderProps() {
  const noSel = document.getElementById('cb-no-selection');
  const form = document.getElementById('cb-props-form');
  const title = document.getElementById('cb-props-title');

  if (!selectedPath) {
    noSel.style.display = 'flex';
    form.style.display = 'none';
    return;
  }

  const node = getNode(selectedPath);
  if (!node) return;

  noSel.style.display = 'none';
  form.style.display = 'block';
  form.innerHTML = '';

  const t = node.type || node.tipo || '';
  title.textContent = nodeLabel(node);

  // Render the appropriate form
  if (t === 'section') renderSectionForm(form, node);
  else if (CONTAINER_TYPES.includes(t)) renderContainerForm(form, node, t);
  else if (t.startsWith('dynamic_')) renderDynamicForm(form, node, t);
  else if (CONTENT_TYPES.includes(t)) renderContentForm(form, node, t);
  else renderTabItemForm(form, node);
}

// ---- FIELD BUILDERS ----
function field(label, hint, child) {
  const g = document.createElement('div');
  g.className = 'cb-field-group';
  const lbl = document.createElement('label');
  lbl.className = 'cb-field-label';
  lbl.innerHTML = label + (hint ? `<span class="cb-field-hint">${hint}</span>` : '');
  g.appendChild(lbl);
  g.appendChild(child);
  return g;
}

function textInput(val, onChange, placeholder) {
  const i = document.createElement('input');
  i.type = 'text';
  i.className = 'cb-input';
  i.value = val || '';
  if (placeholder) i.placeholder = placeholder;
  i.addEventListener('input', () => onChange(i.value));
  return i;
}

function textArea(val, onChange, placeholder) {
  const t = document.createElement('textarea');
  t.className = 'cb-textarea';
  t.value = val || '';
  if (placeholder) t.placeholder = placeholder;
  t.addEventListener('input', () => onChange(t.value));
  return t;
}

function selectInput(options, val, onChange) {
  const s = document.createElement('select');
  s.className = 'cb-select';
  options.forEach(o => {
    const opt = document.createElement('option');
    opt.value = typeof o === 'object' ? o.value : o;
    opt.textContent = typeof o === 'object' ? o.label : o;
    if (opt.value == val) opt.selected = true;
    s.appendChild(opt);
  });
  s.addEventListener('change', () => onChange(s.value));
  return s;
}

function colorField(label, val, onChange) {
  const row = document.createElement('div');
  row.className = 'cb-color-row';
  const swatch = document.createElement('div');
  swatch.className = 'cb-color-swatch';
  swatch.style.background = COLOR_MAP[val||''] || '#f8fafc';
  const sel = selectInput(COLORS.map(c => ({value:c, label:COLOR_NAME_MAP[c]||c||'(nenhum)'})), val, (v) => {
    swatch.style.background = COLOR_MAP[v] || '#f8fafc';
    onChange(v);
  });
  row.appendChild(swatch);
  row.appendChild(sel);
  return field(label, '', row);
}

function checkboxField(label, val, onChange) {
  const row = document.createElement('div');
  row.className = 'cb-checkbox-row';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!val;
  cb.addEventListener('change', () => onChange(cb.checked));
  const span = document.createElement('span');
  span.textContent = label;
  row.appendChild(cb);
  row.appendChild(span);
  return row;
}

function spacingField(label, val, onChange) {
  const s = selectInput(SPACINGS.map(v => ({value:v, label: formatSpacingLabel(v)})), val, onChange);
  return field(label, '', s);
}

function iconField(label, val, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'cb-icon-picker';
  const row = document.createElement('div');
  row.className = 'cb-icon-picker-input';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'cb-input';
  inp.value = val || '';
  inp.placeholder = 'ex: star, cog, user...';
  const preview = document.createElement('div');
  preview.className = 'cb-icon-preview';
  preview.innerHTML = val ? `<i class="fa fa-${val}"></i>` : '';
  const dropdown = document.createElement('div');
  dropdown.className = 'cb-icon-dropdown';
  
  function updateDropdown(q) {
    dropdown.innerHTML = '';
    const results = FA_ICONS.filter(i => i.includes(q.toLowerCase())).slice(0,30);
    if (!results.length) { dropdown.classList.remove('open'); return; }
    results.forEach(icon => {
      const opt = document.createElement('div');
      opt.className = 'cb-icon-option';
      opt.innerHTML = `<i class="fa fa-${icon}"></i><span>${icon}</span>`;
      opt.addEventListener('click', () => {
        inp.value = icon;
        preview.innerHTML = `<i class="fa fa-${icon}"></i>`;
        dropdown.classList.remove('open');
        onChange(icon);
      });
      dropdown.appendChild(opt);
    });
    dropdown.classList.add('open');
  }

  inp.addEventListener('input', () => {
    preview.innerHTML = inp.value ? `<i class="fa fa-${inp.value}"></i>` : '';
    updateDropdown(inp.value);
    onChange(inp.value);
  });
  inp.addEventListener('blur', () => setTimeout(() => dropdown.classList.remove('open'), 200));

  row.appendChild(inp);
  row.appendChild(preview);
  wrap.appendChild(row);
  wrap.appendChild(dropdown);
  return field(label, '', wrap);
}

function sectionDivider(label) {
  const d = document.createElement('div');
  d.className = 'cb-section-divider';
  d.textContent = label;
  return d;
}

function updateNodeField(key, val) {
  const node = getNode(selectedPath);
  if (!node) return;
  if (val === '' || val === null || val === undefined || val === false) {
    delete node[key];
  } else {
    node[key] = val;
  }
  syncTextarea();
  // re-render tree label only
  renderTree();
}

function addChildToNode(parentPath, type) {
  const parent = getNode(parentPath);
  if (!parent) return;

  const newNode = createDefaultNode(type);

  if (parent.type === 'section' || parent.tipo === 'section') {
    if (!parent.components) parent.components = [];
    parent.components.push(newNode);
  } else if (CONTAINER_TYPES.includes(parent.type || parent.tipo)) {
    if (!parent.tabs) parent.tabs = [];
    parent.tabs.push(newNode);
  }

  syncTextarea();
  renderTree();
}

function createDefaultNode(type) {
  const base = { type };
  if (type === 'section') return { type:'section', bg:'yin', main:{container:true}, components:[] };
  if (type === 'tabs') return { type:'tabs', style:'yin blue-secondary', tabs:[{id:'tab-1',label:'Tab 1',icon:'file-o',content:''}] };
  if (type === 'accordion') return { type:'accordion', style:'yang red-secondary', tabs:[{id:'ac-1',label:'Accordion 1',icon:'cog',content:''}] };
  if (type === 'carousel') return { type:'carousel', style:'yin orange', tabs:[{id:'slide-1',label:'Slide 1',image:'',content:''}] };
  if (type === 'header') return { type:'header', titulo:'Novo Título', theme:'rcb', alignment:'center' };
  if (type === 'imagem') return { type:'imagem', imagem:'', titulo:'', clicavel:false, rounded:false };
  if (type === 'youtube') return { type:'youtube', video_id:'', rounded:false };
  if (type === 'mapa') return { type:'mapa', latitude:'', longitude:'', id:'mapa-' + Date.now() };
  if (type === 'button_rounded') return { type:'button_rounded', texto:'Botão', theme:'blue', href:'/' };
  if (type === 'button_square') return { type:'button_square', href:'#', titulo:'Título', descricao:'' };
  if (type === 'button_inline') return { type:'button_inline', texto:'Botão', theme:'yang', color:'blue', href:'/' };
  if (type === 'conteudo_square') return { type:'conteudo_square', imagem:'', titulo:'Card', descricao:'', text_align:'start', image_align_mobile:'top', image_align_desktop:'left' };
  if (type === 'dynamic_slider') return { type:'dynamic_slider', tag_ids:[], size:'medium' };
  if (type === 'dynamic_texto') return { type:'dynamic_texto', conteudo:'', theme_foreground:'yin' };
  if (type === 'dynamic_noticias') return { type:'dynamic_noticias', tag_ids:[], pagination:false };
  if (type === 'dynamic_arquivos') return { type:'dynamic_arquivos', tag_ids:[], pagination:false };
  if (type === 'dynamic_arquivo') return { type:'dynamic_arquivo', tag_ids:[] };
  if (type === 'dynamic_calendar') return { type:'dynamic_calendar', tag_ids:[] };
  return base;
}

// ============================================================
// DELETE / DUPLICATE / MOVE
// ============================================================
function confirmDelete(path) {
  if (!confirm('Deletar este elemento?')) return;
  deleteNode(path);
  selectedPath = null;
  syncTextarea();
  renderTree();
  renderProps();
}

function duplicateSelected() {
  if (!selectedPath) return;
  const node = getNode(selectedPath);
  if (!node) return;
  const clone = JSON.parse(JSON.stringify(node));
  const parentPath = selectedPath.slice(0,-1);
  const idx = selectedPath[selectedPath.length-1];
  if (parentPath.length === 0) {
    state.splice(idx+1, 0, clone);
  } else {
    const parent = getNode(parentPath);
    if (Array.isArray(parent)) parent.splice(idx+1, 0, clone);
  }
  syncTextarea();
  renderTree();
}

function moveNode(path, dir) {
  const parentPath = path.slice(0,-1);
  const idx = path[path.length-1];
  const parent = parentPath.length === 0 ? state : getNode(parentPath);
  if (!Array.isArray(parent)) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= parent.length) return;
  [parent[idx], parent[newIdx]] = [parent[newIdx], parent[idx]];
  syncTextarea();
  renderTree();
}

// ============================================================
// DRAG AND DROP
// ============================================================
function startDrag(e, path) {
  dragState = { path };
  e.dataTransfer.effectAllowed = 'move';
}

function endDrag(targetPath) {
  if (!dragState) return;
  const from = dragState.path;
  dragState = null;
  if (JSON.stringify(from) === JSON.stringify(targetPath)) return;

  // Only support same-parent reorder for now
  const fromParent = from.slice(0,-1);
  const toParent = targetPath.slice(0,-1);
  if (JSON.stringify(fromParent) !== JSON.stringify(toParent)) return;

  const parent = fromParent.length === 0 ? state : getNode(fromParent);
  if (!Array.isArray(parent)) return;

  const fi = from[from.length-1];
  const ti = targetPath[targetPath.length-1];
  const item = parent.splice(fi, 1)[0];
  parent.splice(ti, 0, item);
  syncTextarea();
  renderTree();
}

// ============================================================
// SYNC
// ============================================================
function syncTextarea() {
  if (jsonTextarea) {
    jsonTextarea.value = JSON.stringify(state, null, 2);
    jsonTextarea.dispatchEvent(new Event('change', { bubbles: true }));
  }
  const w = document.getElementById('cb-preview-wrapper');
  if (w && w.style.display !== 'none') {
    // do not reload immediately, just mark that we need a manual refresh
    previewRequiresReload = true;
    const previewBtn = document.getElementById('cb-preview-btn');
    if (previewBtn) {
      previewBtn.innerHTML = '<i class="fa fa-sync-alt"></i>';
      previewBtn.title = 'Recarregue para ver as alterações';
    }
  } else {
    // preview hidden, keep iframe up to date so it shows when opened
    updatePreview();
  }
}

function updatePreview() {
  const iframe = document.getElementById('cb-preview');
  if (!iframe) return;
  try {
    let url = '/component-preview/?json=' + encodeURIComponent(JSON.stringify(state));
    // try to read the page header type from a form field if present
    const hdrInput = document.querySelector('select[name="header_type"], input[name="header_type"]');
    if (hdrInput && hdrInput.value) {
      url += '&header=' + encodeURIComponent(hdrInput.value);
    }
    iframe.src = url;
  } catch(e) {
    // ignore
  }
}

function setupPreviewLinks() {
  const iframe = document.getElementById('cb-preview');
  if (!iframe) return;
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        alert('você não pode clicar em links no modo editor');
      });
    });
  } catch(e) {
    // may not be loaded yet
  }
}

// attach listener when iframe loads
const previewIframe = document.getElementById('cb-preview');
if (previewIframe) {
  previewIframe.addEventListener('load', setupPreviewLinks);
}

// dragging logic for the preview wrapper
(function(){
  const w = document.getElementById('cb-preview-wrapper');
  const bar = document.getElementById('cb-preview-bar');
  const overlay = document.getElementById('cb-drag-overlay');
  
  // Move wrapper to body to avoid z-index stacking context issues
  if (w && document.body) document.body.appendChild(w);

  if (!w || !bar) return;
  let dragging=false, offsetX=0, offsetY=0;
  bar.addEventListener('mousedown', e => {
    dragging = true;
    offsetX = e.clientX - w.offsetLeft;
    offsetY = e.clientY - w.offsetTop;
    document.body.style.userSelect = 'none';
    if (overlay) overlay.style.display = 'block'; // Enable overlay to catch mouse events over iframe
  });
  document.addEventListener('mousemove', e => {
    if (dragging) {
      w.style.left = (e.clientX - offsetX) + 'px';
      w.style.top  = (e.clientY - offsetY) + 'px';
    }
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    document.body.style.userSelect = '';
    if (overlay) overlay.style.display = 'none'; // Disable overlay so user can interact with iframe
  });

  // maximize toggle
  const maxBtn = document.getElementById('cb-preview-maximize');
  let maximized = false;
  const prev = {};
  if (maxBtn) {
    maxBtn.addEventListener('click', () => {
      if (!maximized) {
        prev.top = w.style.top;
        prev.left = w.style.left;
        prev.width = w.style.width;
        prev.height = w.style.height;
        w.style.top = '5%';
        w.style.left = '5%';
        w.style.width = '90%';
        w.style.height = '90%';
      } else {
        w.style.top = prev.top;
        w.style.left = prev.left;
        w.style.width = prev.width;
        w.style.height = prev.height;
      }
      maximized = !maximized;
    });
  }

  // prevent wrapper transitions during user resize
  w.addEventListener('mousedown', e => {
    if (e.target === w) {
      w.style.transition = 'none';
    }
  });
  w.addEventListener('mouseup', () => {
    w.style.transition = 'none'; // keep it off until closed/reopened
  });
})();

// if the administrator can choose a header on the page form, make
// sure the preview updates when they change it
const hdrInput = document.querySelector('select[name="header_type"], input[name="header_type"]');
if (hdrInput) {
  hdrInput.addEventListener('change', () => {
    // immediately refresh the iframe and reset reload state
    updatePreview();
    previewRequiresReload = false;
    const previewBtn = document.getElementById('cb-preview-btn');
    if (previewBtn) {
      previewBtn.innerHTML = '<i class="fa fa-eye"></i>';
      previewBtn.title = 'Visualizar';
    }
  });
}

// ============================================================

init();

})();
</script>
