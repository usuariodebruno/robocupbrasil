<a href="{{ href|default:'#' }}"
    class="button-square flex flex-column flex-center w-100"
    style="
        {% if theme_primary %}--primary: var(--{{ theme_primary }});{% endif %}
        {% if theme_secondary %}--secondary: var(--{{ theme_secondary }});{% endif %}
        {% if theme_foreground %}--foreground: var(--{{ theme_foreground }});{% endif %}
    ">
    <div class="text-align-center">
        {% if icon %}
            <i class="fa fa-{{ icon }} text-xxlarge text-yin block margin-b-0/"></i>
        {% endif %}
        <span class="text-large">{{ titulo }}</span>
    </div>
    {% if descricao %}
        <span class="text-medium" style="opacity:60%">{{ descricao }}</span>
    {% endif %}
</a>
