{% load static %}
<div id="calendar-component" class="component calendar-component" data-events='[
    {% for d in datas %}
        {"date": "{{ d.data|date:"Y-m-d" }}", "descricao": "{{ d.descricao|escapejs }}", "cor": "{{ d.cor }}", "link": "{{ d.action_link }}"}{% if not forloop.last %},{% endif %}
    {% endfor %}
    ]'
    style="
        {% if theme_primary %}--header: var(--{{ theme_primary }});{% endif %}
        {% if theme_secondary %}--card: var(--{{ theme_secondary }});{% endif %}
        {% if theme_foreground %}--foreground: var(--{{ theme_foreground }});{% endif %}
    ">
    <div class="flex flex-column desktop:flex-row align-items-start">
        <div id="calendar-list" class="desktop:margin-b-0 desktop:padding-r-2">
            <div id="upcoming-events-header" class="flex flex-center calendar-container-card calendar-header-card margin-b-1">
                <span class="text-large semibold">Próximos eventos</span>
            </div>
            <div class="event-list-items">
                {% for d in datas %}
                    {% if d.action_link %}
                        <a href="{{ d.action_link }}" class="event-card" data-date="{{ d.data|date:'Y-m-d' }}" style="--event-color: {{ d.cor }}">
                            <div class="event-card-content flex">
                                <div class="event-date text-large bold">{{ d.data|date:"d/m" }}</div>
                                <div class="event-desc">{{ d.descricao }}</div>
                            </div>
                        </a>
                    {% else %}
                        <div class="event-card no-link" data-date="{{ d.data|date:'Y-m-d' }}" style="--event-color: {{ d.cor }}">
                            <div class="event-card-content flex">
                                <div class="event-date text-large bold">{{ d.data|date:"d/m" }}</div>
                                <div class="event-desc">{{ d.descricao }}</div>
                            </div>
                        </div>
                    {% endif %}
                {% empty %}
                    <div class="margin-x-1">Nenhum evento futuro cadastrado.</div>
                {% endfor %}
            </div>
        </div>
        <div id="calendar-grid">
            <div id="rcb-calendar-controls" class="calendar-container-card calendar-header-card margin-b-1">
                <button id="cal-prev" style="visibility: hidden;" class="calendar-nav-btn"><i style="padding-top:2px;padding-right: 2px;" class="fa fa-chevron-left"></i></button>
                <span id="cal-month" class="text-large semibold"></span>
                <button id="cal-next" class="calendar-nav-btn"><i style="padding-top:2px;padding-left: 2px;" class="fa fa-chevron-right"></i></button>
            </div>
            <div class="calendar-container-card">
                <div id="rcb-calendar-weekdays" class="desktop-only"></div>
                <div id="rcb-calendar-days"></div>
            </div>
        </div>
    </div>
</div>
