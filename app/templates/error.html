{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" href="{% static 'images/favicon/rcb.png' %}" type="image/png"/>

        <title>Eita! | RoboCup Brasil</title>

        <style>
            * {
                margin: 0;
                font-family: ui-sans-serif,system-ui,sans-serif;
            }

            .margin-small {
                margin: 0 auto;
            }

            .logo-img {
                height: 40px;
            }

            .center-small {
                text-align: center;
            }

            .top-cloud {
                bottom: 75px;
                z-index: 8;
                transform: translateX(-50%);
            }

            .robot {
                height: 200px;
                left: 50%;
                transform: translateX(-50%);
                bottom: 25px;
            }

            .left-cloud {
                z-index: 4;
            }

            .right-cloud {
                z-index: 9;
            }

            .main-error {
                font-size: 14.5pt;
            }

            .main-code {
                margin-top: 1rem;
                font-size: 11pt;
            }

            /* Small devices (landscape phones, 576px and up) */
            @media (min-width: 576px) {
                .main-error {
                    font-size: 15.5pt;
                }

                .main-code {
                    font-size: 13pt;
                }
            }

            /* Medium devices (tablets, 768px and up) */
            @media (min-width: 768px) {
                .margin-small {
                    margin: 0;
                }

                .center-small {
                    text-align: start;
                    padding: 2.5rem;
                }

                .half-big {
                    width: 50vw;
                }

                .top-cloud {
                    z-index: 3;
                    bottom: unset;
                    top: 0;
                    transform: unset;
                }

                .robot {
                    transform: unset;
                    left: unset;
                    bottom: unset;
                    height: 90vh;
                    right: 25px;
                }

                .left-cloud {
                    z-index: 4;
                }

                .right-cloud {
                    z-index: 5;
                }

                .main-error {
                    font-size: 18.5pt;
                }

                .main-code {
                    margin-top: 2rem;
                    font-size: 15pt;
                }
            }

            /* Large devices (desktops, 992px and up) */
            @media (min-width: 992px) {

            }

            /* X-Large devices (large desktops, 1200px and up) */
            @media (min-width: 1200px) {
                .main-error {
                    font-size: 20pt;
                }

                .main-code {
                    font-size: 15.5pt;
                }

                .logo-img {
                    height: 45px;
                }
            }
        </style>
    </head>
    <body class="antialiased relative" style="overflow-x: hidden; min-height: 100vh; color: #f4fcfc; letter-spacing: 0.025em; background: #5688BE; background: linear-gradient(180deg, #5688BE 0%, #5F95CF 100%);">
        <img draggable="false" class="top-cloud" style="position: absolute; left: 50%; height: 200px" src="{% static 'images/clouds/cloud-top.png' %}" alt="Nuvem"/>
        <img draggable="false" class="left-cloud" style="position: absolute;  bottom: 0; left: 0; height: 200px" src="{% static 'images/clouds/cloud-left.png' %}" alt="Nuvem"/>
        <img draggable="false" class="right-cloud" style="position: absolute; bottom: 0; right: 0; height: 200px" src="{% static 'images/clouds/cloud-right.png' %}" alt="Nuvem"/>
        <img draggable="false" class="robot" style="position: absolute; z-index: 6;" src="{% static 'images/clouds/robot.png' %}" alt="Robô"/>
        <div class="half-big" style="position: relative; z-index: 10">
            <div style="padding: 2.5rem;">
                <a href="/"><img style="display: block;" class="margin-small logo-img" src="{% static 'images/logo-white.png' %}" alt="RoboCup Brasil"/></a>
            </div>
            <div class="center-small" style="padding: 0 2.5rem; text-shadow: 0px 0px 10px #5688BE;">
                <p class="main-error" style="font-weight: 500">
                    Eita! Parece que essa página não existe ou não está visível para o seu usuário. Tente outro endereço ou retorne à página anterior.
                <div>
                    <button style="background: #f4fcfc; padding: 0.75rem 1.75rem; border-radius: 10px; margin-top: 2rem; font-size: 11pt; border: none; cursor: pointer;" onclick="history.back()">
                        Voltar
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
