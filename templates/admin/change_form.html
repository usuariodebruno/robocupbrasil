{% extends "admin/change_form.html" %}
{% load i18n admin_urls static admin_modify %}
{% load dash_tags %}

{% block submit_buttons_bottom %}
    <div class="lg:col-span-1 flex flex-col justify-between">
        <div>
            <a class="max-2xl:hidden block mb-2 font-bold text-center border rounded-lg border-base-300 p-2 hover:bg-base-300 transition mb-4" href="#saving-area">
                Pular para salvar
            </a>
            <div class="max-2xl:hidden border-t max-w-md border-base-300">
                {% if original and not is_popup %}
                    {% include "admin/includes/object_history_summary.html" %}
                {% endif %}
            </div>
        </div>

        <div id="saving-area" class="w-full z-20 border-t border-base-300  sticky lg:mb-3">
            {% submit_row %}
        </div>
    </div>
{% endblock %}
